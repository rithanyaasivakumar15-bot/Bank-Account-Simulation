<!DOCTYPE html>
<html>
<head>
    <title>BDB | Open Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">BDB | BENGALURU</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>

    <div class="login-container" style="max-width: 450px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="text-align: center; color: #2d3436; margin-bottom: 10px;">Create Digital Account</h2>
        <p style="text-align: center; color: #636e72; margin-bottom: 25px;">Join Bengaluru's fastest growing bank.</p>

        <!-- ALERT SECTION FOR CREATION ERRORS -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="background: #fff0f0; padding: 12px; border: 1px solid #ff7675; color: #d63031; margin-bottom: 20px; border-radius: 6px; text-align: center; font-size: 0.9em;">
                    {{ messages[-1] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="/create" method="POST">
            <div style="margin-bottom: 15px;">
                <input type="text" name="name" placeholder="Full Name" required style="width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="text" name="acc_no" placeholder="Desired Account Number" required style="width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="password" name="pin" placeholder="Set 4-Digit PIN" required style="width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; color: #636e72; font-size: 0.85em;">Initial Deposit (₹)</label>
                <input type="number" name="balance" value="500" min="500" required style="width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box;">
            </div>
            <button type="submit" class="cta-button primary-cta" style="width: 100%; padding: 12px; cursor: pointer; border: none;">Create My Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; color: #636e72; font-size: 0.9em;">
            Already have an account? <a href="/login" style="color: #3498db; text-decoration: none; font-weight: bold;">Login here</a>
        </p>
    </div>
</body>
</html>
