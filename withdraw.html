<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Withdraw - BDB</title>
</head>
<body>
    <nav class="navbar"><div class="nav-logo">BDB</div><ul class="nav-links"><li><a href="/">Home</a></li></ul></nav>
    
    <div class="container" style="margin-top: 100px;">
        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: #003366;">Withdraw Funds</h2>
            <p style="color: #7f8c8d; font-size: 14px;">Securely move funds to your external account</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/withdraw" method="POST">
            <label style="font-size: 12px; font-weight: bold; color: #003366;">AMOUNT (₹)</label>
            <input type="number" name="amount" placeholder="Enter amount to withdraw" min="1" step="0.01" required>
            
            <button type="submit" style="background-color: #e74c3c; margin-top: 20px; box-shadow: 0 4px 15px rgba(231,76,60,0.2);">
                Confirm Withdrawal
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #7f8c8d; text-decoration: none; font-size: 14px;">Cancel and Return</a>
        </div>
    </div>
</body>
</html>
